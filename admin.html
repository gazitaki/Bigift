<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BiGift — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#FFF8F5;color:#1A1A2E;font-family:'Inter',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#E8355A;border-radius:2px;}
:root{
  --gold:#E8355A;--gold2:#FF6B8A;--gold3:#C0203F;
  --secondary:#F5A623;--secondary2:#FFD166;
  --bg:#FFF8F5;--bg3:#FFFFFF;
  --border:rgba(232,53,90,.15);--border2:rgba(26,26,46,.08);
  --text:#1A1A2E;--muted:#8A7A8A;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes bellShake{0%,100%{transform:rotate(0)}20%{transform:rotate(18deg)}40%{transform:rotate(-14deg)}60%{transform:rotate(10deg)}80%{transform:rotate(-6deg)}}
#login-screen{position:fixed;inset:0;z-index:999;background:linear-gradient(135deg,#FFF0EB,#FFF8F5);display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{background:#fff;border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:100%;max-width:360px;animation:fadeUp .5s ease;text-align:center;box-shadow:0 8px 40px rgba(232,53,90,.1);}
.login-logo{height:60px;width:auto;margin:0 auto 8px;display:block;}
.login-sub{font-size:9px;letter-spacing:.4em;color:var(--muted);text-transform:uppercase;margin-bottom:32px;}
.login-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);margin-bottom:6px;font-weight:700;}
.login-desc{font-size:12px;color:var(--muted);margin-bottom:28px;line-height:1.6;}
.login-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold3));color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;border:none;letter-spacing:.04em;}
.login-btn:hover{opacity:.88;}
.login-error{margin-top:16px;font-size:12px;color:#d07070;background:rgba(180,40,40,.1);border:1px solid rgba(180,40,40,.2);padding:10px 14px;border-radius:8px;display:none;}
.topbar{position:fixed;top:0;left:0;right:0;z-index:300;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(255,248,245,.96);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);box-shadow:0 2px 16px rgba(232,53,90,.08);}
.topbar-left{display:flex;align-items:center;gap:14px;}
.hamburger{width:38px;height:38px;border-radius:10px;background:rgba(232,53,90,.08);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:background .2s;}
.hamburger:hover,.hamburger.open{background:rgba(232,53,90,.15);}
.hb-line{width:16px;height:2px;background:var(--gold);border-radius:2px;transition:all .3s;transform-origin:center;}
.hamburger.open .hb-line:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.open .hb-line:nth-child(2){opacity:0;transform:scaleX(0);}
.hamburger.open .hb-line:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.topbar-logo{height:32px;width:auto;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-section{font-size:11px;color:var(--muted);letter-spacing:.1em;background:rgba(232,53,90,.08);border:1px solid var(--border);padding:4px 12px;border-radius:20px;}
.notif-btn{position:relative;width:36px;height:36px;border-radius:10px;background:rgba(232,53,90,.06);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:background .2s;}
.notif-btn:hover{background:rgba(232,53,90,.12);}
.notif-btn.ringing{animation:bellShake .6s ease;}
.notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:#E8355A;border-radius:50%;border:2px solid #FFF8F5;display:none;}
.notif-dot.show{display:block;}
.logout-btn{padding:5px 12px;border-radius:20px;border:1px solid rgba(232,53,90,.3);background:rgba(232,53,90,.08);color:var(--gold);font-size:10px;cursor:pointer;transition:all .2s;letter-spacing:.06em;}
.logout-btn:hover{background:rgba(232,53,90,.18);}
.drawer-overlay{position:fixed;inset:0;z-index:400;background:rgba(26,26,46,.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s;}
.drawer-overlay.show{opacity:1;pointer-events:all;}
.drawer{position:fixed;top:0;left:0;bottom:0;z-index:500;width:260px;background:linear-gradient(180deg,#fff,#FFF8F5);border-right:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:8px 0 40px rgba(232,53,90,.1);}
.drawer.open{transform:translateX(0);}
.drawer-header{padding:32px 24px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;background:linear-gradient(135deg,rgba(232,53,90,.05),rgba(245,166,35,.05));}
.dh-logo{height:36px;width:auto;}
.dh-badge{display:inline-block;margin-top:6px;font-size:8px;letter-spacing:.22em;background:rgba(232,53,90,.1);border:1px solid rgba(232,53,90,.2);color:var(--gold);padding:3px 10px;border-radius:20px;text-transform:uppercase;}
.drawer-close{width:30px;height:30px;border-radius:8px;background:rgba(232,53,90,.08);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:15px;transition:all .2s;}
.drawer-close:hover{color:var(--gold);}
.drawer-nav{padding:16px 0;flex:1;}
.nav-label{font-size:9px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;padding:0 24px;margin:12px 0 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:13px 24px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .2s;border-left:3px solid transparent;letter-spacing:.04em;}
.nav-item:hover{color:var(--gold);background:rgba(232,53,90,.04);}
.nav-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(232,53,90,.07);}
.ni-icon{font-size:16px;width:20px;text-align:center;}
.drawer-footer{padding:16px 24px;border-top:1px solid var(--border);}
.back-btn{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);text-decoration:none;letter-spacing:.06em;transition:color .2s;}
.back-btn:hover{color:var(--gold);}
.content{margin-top:58px;padding:24px 16px 80px;min-height:calc(100vh - 58px);}
.page-header{margin-bottom:24px;animation:fadeUp .4s ease;}
.page-header h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--text);margin-bottom:4px;}
.page-header p{font-size:12px;color:var(--muted);}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
.stat-card{background:#fff;border:1px solid var(--border2);border-radius:14px;padding:16px 14px;animation:fadeUp .4s ease both;position:relative;overflow:hidden;box-shadow:0 2px 12px rgba(26,26,46,.06);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--secondary));opacity:.7;}
.stat-val{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);line-height:1;margin-bottom:4px;font-weight:700;}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-weight:600;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.stat-trend{font-size:10px;margin-top:3px;}
.stat-trend.up{color:#06D6A0;}
.stat-trend.down{color:#E8355A;}
                   </style>
                   <style>
.chart-card{background:#fff;border:1px solid var(--border2);border-radius:14px;padding:18px 16px;margin-bottom:20px;animation:fadeUp .5s ease both;box-shadow:0 2px 12px rgba(26,26,46,.06);}
.chart-card h3{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);margin-bottom:4px;font-weight:600;}
.chart-sub{font-size:11px;color:var(--muted);margin-bottom:16px;}
.chart-tabs{display:flex;gap:6px;margin-bottom:14px;}
.chart-tab{padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;transition:all .2s;border:1px solid transparent;color:var(--muted);letter-spacing:.06em;}
.chart-tab.active{background:rgba(232,53,90,.1);border-color:rgba(232,53,90,.25);color:var(--gold);}
.chart-wrap{position:relative;height:180px;}
.top-prod-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border2);}
.tp-rank{font-family:'Playfair Display',serif;font-size:18px;color:rgba(232,53,90,.3);width:24px;text-align:center;flex-shrink:0;}
.tp-emoji{font-size:22px;flex-shrink:0;}
.tp-info{flex:1;min-width:0;}
.tp-name{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tp-count{font-size:11px;color:var(--muted);margin-top:1px;}
.tp-rev{font-family:'Playfair Display',serif;font-size:13px;color:var(--gold);flex-shrink:0;font-weight:700;}
.panel{background:#fff;border:1px solid var(--border2);border-radius:14px;margin-bottom:16px;overflow:hidden;animation:fadeUp .5s ease both;box-shadow:0 2px 12px rgba(26,26,46,.06);}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border2);}
.panel-head h2{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);font-weight:600;letter-spacing:.04em;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.04em;transition:all .2s;border:none;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold3));color:#fff;font-weight:700;}
.btn-gold:hover{opacity:.88;transform:translateY(-1px);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-danger{background:rgba(180,30,30,.08);border:1px solid rgba(180,30,30,.2);color:#d07070;}
.btn-danger:hover{background:rgba(180,30,30,.15);}
.btn-whatsapp{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:#25d366;}
.btn-whatsapp:hover{background:rgba(37,211,102,.2);}
.btn-sm{padding:6px 11px;font-size:11px;}
.btn-icon{padding:7px 9px;border-radius:7px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.form-row.single{grid-template-columns:1fr;}
.form-group{display:flex;flex-direction:column;gap:5px;}
label{font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;font-weight:600;}
input,select,textarea{background:rgba(232,53,90,.04);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .2s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:rgba(232,53,90,.4);}
input::placeholder,textarea::placeholder{color:var(--muted);}
select option{background:#fff;}
.emoji-row{display:flex;align-items:center;gap:10px;}
.emoji-prev{font-size:26px;line-height:1;min-width:32px;}
.img-preview{width:100%;height:120px;border-radius:8px;object-fit:cover;margin-top:8px;border:1px solid var(--border2);display:none;}
.img-preview.show{display:block;}
.img-url-note{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.5;}
.search-bar{display:flex;gap:8px;margin-bottom:14px;align-items:center;}
.search-input{flex:1;background:rgba(232,53,90,.04);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:rgba(232,53,90,.3);}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.filter-pill{padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;transition:all .2s;border:1px solid var(--border2);color:var(--muted);background:transparent;}
.filter-pill:hover{border-color:var(--gold);color:var(--gold);}
.filter-pill.active{background:rgba(232,53,90,.1);border-color:rgba(232,53,90,.3);color:var(--gold);}
.cat-row{display:flex;flex-direction:column;background:#fff;border:1px solid var(--border2);border-radius:12px;margin-bottom:10px;overflow:hidden;animation:fadeUp .3s ease both;transition:border-color .2s;}
.cat-row:hover{border-color:rgba(232,53,90,.2);}
.cat-row-main{display:flex;align-items:center;justify-content:space-between;padding:14px;}
.cr-left{display:flex;align-items:center;gap:12px;}
.cr-icon{font-size:22px;width:34px;text-align:center;}
.cr-name{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);font-weight:600;}
.cr-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.cr-actions{display:flex;gap:6px;flex-shrink:0;}
.subcat-section{background:rgba(232,53,90,.03);border-top:1px solid var(--border2);padding:12px 14px;}
.subcat-title{font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:8px;}
.subcat-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#fff;border:1px solid var(--border2);border-radius:8px;margin-bottom:6px;}
.subcat-item-left{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);}
.subcat-item-actions{display:flex;gap:4px;}
.prod-card{background:#fff;border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;animation:fadeUp .3s ease both;transition:border-color .2s;box-shadow:0 2px 8px rgba(26,26,46,.04);}
.prod-card:hover{border-color:rgba(232,53,90,.2);}
.pc-img{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;background:rgba(232,53,90,.06);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;}
.pc-img img{width:100%;height:100%;object-fit:cover;}
.pc-info{flex:1;min-width:0;}
.pc-name{font-family:'Playfair Display',serif;font-size:14px;color:var(--text);margin-bottom:4px;font-weight:600;}
.pc-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.pc-cat{font-size:10px;padding:2px 7px;border-radius:12px;background:rgba(232,53,90,.1);border:1px solid rgba(232,53,90,.2);color:var(--gold);}
.pc-price{font-size:12px;color:var(--gold);font-weight:600;}
.pc-stock{font-size:10px;padding:2px 7px;border-radius:10px;}
.pc-stock.ok{background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.2);color:#047857;}
.pc-stock.low{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);color:#92400e;}
.pc-stock.out{background:rgba(180,40,40,.1);border:1px solid rgba(180,40,40,.2);color:#d07070;}
.pc-desc{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5;}
.pc-actions{display:flex;gap:6px;flex-shrink:0;}
.order-card{background:#fff;border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:10px;animation:fadeUp .3s ease both;transition:border-color .2s;box-shadow:0 2px 8px rgba(26,26,46,.04);}
.order-card:hover{border-color:rgba(232,53,90,.12);}
.order-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.order-id{font-family:'Playfair Display',serif;font-size:13px;color:var(--text);font-weight:600;}
.order-date{font-size:10px;color:var(--muted);margin-top:2px;}
.order-status{font-size:10px;padding:3px 10px;border-radius:20px;letter-spacing:.06em;font-weight:600;flex-shrink:0;}
.status-new{background:rgba(232,53,90,.1);border:1px solid rgba(232,53,90,.25);color:var(--gold);}
.status-preparing{background:rgba(50,100,200,.1);border:1px solid rgba(50,100,200,.25);color:#3264c8;}
.status-shipped{background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.25);color:#047857;}
.status-delivered{background:rgba(100,100,100,.1);border:1px solid rgba(100,100,100,.25);color:#606060;}
.status-cancelled{background:rgba(180,40,40,.1);border:1px solid rgba(180,40,40,.25);color:#d07070;}
.order-items{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.order-item-chip{display:flex;align-items:center;gap:4px;background:rgba(232,53,90,.05);border:1px solid var(--border2);border-radius:20px;padding:3px 8px;font-size:11px;color:var(--muted);}
.order-note{font-size:11px;color:var(--muted);font-style:italic;background:rgba(232,53,90,.04);border:1px solid rgba(232,53,90,.08);border-radius:6px;padding:6px 10px;margin-bottom:8px;}
.order-addr{font-size:11px;color:var(--muted);background:rgba(26,26,46,.03);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;margin-bottom:8px;line-height:1.6;}
.order-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.order-total{font-family:'Playfair Display',serif;font-size:15px;color:var(--gold);font-weight:700;}
.order-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.tracking-row{display:flex;gap:8px;align-items:center;margin-top:8px;}
.tracking-input{flex:1;padding:7px 10px;font-size:12px;border-radius:8px;}
select.status-select{padding:6px 10px;font-size:11px;border-radius:20px;background:rgba(232,53,90,.05);border:1px solid var(--border);color:var(--text);width:auto;outline:none;}
.ov-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border2);}
.ov-left{display:flex;align-items:center;gap:10px;}
.ov-icon{font-size:18px;}
.ov-name{font-family:'Playfair Display',serif;font-size:13px;color:var(--text);font-weight:600;}
.ov-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.ov-val{font-size:12px;color:var(--gold);font-weight:600;flex-shrink:0;}
.action-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.modal-overlay{position:fixed;inset:0;z-index:600;background:rgba(26,26,46,.8);backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease;}
.modal{background:#fff;border:1px solid var(--border);border-radius:20px 20px 0 0;padding:28px 20px 36px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px;}
.modal h2{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);margin-bottom:20px;font-weight:700;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.notif-panel{position:fixed;top:58px;right:0;width:min(320px,100vw);background:#fff;border-left:1px solid var(--border);border-bottom:1px solid var(--border);z-index:299;transform:translateX(100%);transition:transform .3s ease;max-height:70vh;overflow-y:auto;box-shadow:-4px 4px 20px rgba(232,53,90,.08);}
.notif-panel.open{transform:translateX(0);}
.notif-panel-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.notif-panel-title{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold);font-weight:700;}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border2);animation:fadeIn .3s ease;}
.notif-item.unread{background:rgba(232,53,90,.04);}
.notif-item-title{font-size:12px;color:var(--text);margin-bottom:2px;font-weight:600;}
.notif-item-sub{font-size:10px;color:var(--muted);}
.notif-empty{padding:28px;text-align:center;color:var(--muted);font-size:12px;}
.empty-state{text-align:center;padding:36px 20px;color:var(--muted);}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:.4;}
.empty-text{font-size:13px;letter-spacing:.06em;}
.spinner{width:20px;height:20px;border:2px solid rgba(232,53,90,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;padding:11px 22px;border-radius:30px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;font-weight:600;}
#toast.show{opacity:1;}
#toast.success{background:rgba(6,214,160,.15);border:1.5px solid rgba(6,214,160,.4);color:#047857;}
#toast.error{background:rgba(232,53,90,.1);border:1.5px solid rgba(232,53,90,.3);color:#C0203F;}
@media print{
  .topbar,.drawer,.drawer-overlay,.notif-panel,#toast,.order-actions,.tracking-row,select.status-select{display:none!important;}
  .content{margin-top:0!important;padding:0!important;}
  .order-card{border:1px solid #ccc!important;break-inside:avoid;margin-bottom:12px;}
  body{background:#fff!important;color:#000!important;}
}

            <body>

<div id="login-screen">

  <div class="topbar-right">

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div>
      <img src="https://i.ibb.co/Fks3kkkJ/file-00000000246471fd8c6c3f983c9de4f2.png" class="dh-logo" alt="BiGift"/>
      <span class="dh-badge">Admin Panel</span>
    </div>
    <div class="drawer-close" onclick="closeDrawer()">✕</div>
  </div>
  <nav class="drawer-nav">
    <div class="nav-label">Menü</div>
    <div class="nav-item active" id="nav-overview" onclick="goTo('overview')"><span class="ni-icon">📊</span>Genel Bakış</div>
    <div class="nav-item" id="nav-orders" onclick="goTo('orders')"><span class="ni-icon">📦</span>Siparişler<span id="new-badge" style="display:none;background:var(--gold);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:4px;">0</span></div>
    <div class="nav-item" id="nav-categories" onclick="goTo('categories')"><span class="ni-icon">🗂</span>Kategoriler</div>
    <div class="nav-item" id="nav-products" onclick="goTo('products')"><span class="ni-icon">🎁</span>Ürünler</div>
    <div class="nav-item" id="nav-stats" onclick="goTo('stats')"><span class="ni-icon">📈</span>İstatistikler</div>
  </nav>
  <div class="drawer-footer"><a class="back-btn" href="index-4.html">← Siteye Dön</a></div>
</div>

<div class="notif-panel" id="notif-panel">
  <div class="notif-panel-head">
    <div class="notif-panel-title">🔔 Bildirimler</div>
    <button class="btn btn-outline btn-sm" onclick="clearNotifs()">Temizle</button>
  </div>
  <div id="notif-list"><div class="notif-empty">Bildirim yok</div></div>
</div>

<div class="content" id="main-content" style="display:none"></div>
<div id="modal-container"></div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDocs, addDoc, setDoc, updateDoc,
  deleteDoc, onSnapshot, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyC4XZXohBHNEpFw20HXrWPRvVJUl4BBQs0",
  authDomain:"bigift-ae7eb.firebaseapp.com",
  projectId:"bigift-ae7eb",
  storageBucket:"bigift-ae7eb.firebasestorage.app",
  messagingSenderId:"509685606291",
  appId:"1:509685606291:web:d1ac0a4fc597b127c76a66"
});
const auth = getAuth(app);
const db = getFirestore(app);

window.emailLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pwd = document.getElementById('login-password').value;
  if(!email||!pwd){showErr('E-posta ve şifre zorunlu!');return;}
  try{ await signInWithEmailAndPassword(auth,email,pwd); }
  catch(e){
    const m={'auth/wrong-password':'Şifre hatalı.','auth/user-not-found':'Kullanıcı bulunamadı.',
      'auth/invalid-credential':'E-posta veya şifre hatalı.','auth/too-many-requests':'Çok deneme. Bekleyin.'};
    showErr(m[e.code]||'Hata: '+e.message);
  }
};
function showErr(msg){const el=document.getElementById('login-error');el.textContent=msg;el.style.display='block';}
window.doLogout = ()=>signOut(auth);

onAuthStateChanged(auth, user=>{
  document.getElementById('login-screen').style.display = user?'none':'flex';
  document.getElementById('topbar').style.display = user?'flex':'none';
  document.getElementById('main-content').style.display = user?'block':'none';
  if(user) initApp();
});

let current='overview', cats=[], orders=[], notifs=[], orderFilter='all', orderSearch='';
const LABELS={overview:'Genel Bakış',orders:'Siparişler',categories:'Kategoriler',products:'Ürünler',stats:'İstatistikler'};

async function initApp(){
  await loadCats();
  listenOrders();
  requestNotifPermission();
  render();
}

async function loadCats(){
  try{
    const snap=await getDocs(query(collection(db,'categories'),orderBy('order')));
    cats=[];snap.forEach(d=>cats.push({fsId:d.id,...d.data()}));
  }catch(e){cats=[];}
}

let firstLoad=true;
function listenOrders(){
  onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc')),snap=>{
    const prev=orders.length;
    orders=[];snap.forEach(d=>orders.push({fsId:d.id,...d.data()}));
    const newOrds=orders.filter(o=>o.status==='new').length;
    const b=document.getElementById('new-badge');
    b.style.display=newOrds>0?'inline':'none';b.textContent=newOrds;
    if(!firstLoad && orders.length>prev){
      const newest=orders[0];
      addNotif(`Yeni Sipariş! #${newest.fsId.slice(-6).toUpperCase()}`,`₺${newest.total||0} · ${newest.items?.length||0} ürün`);
      playBeep();
    }
    firstLoad=false;
    if(current==='orders'||current==='overview'||current==='stats') render();
  });
}

function requestNotifPermission(){
  if('Notification' in window && Notification.permission==='default') Notification.requestPermission();
}
function addNotif(title,sub){
  notifs.unshift({title,sub,time:new Date(),unread:true});
  renderNotifPanel();
  document.getElementById('notif-dot').classList.add('show');
  const nb=document.getElementById('notif-btn');
  nb.classList.add('ringing');
  setTimeout(()=>nb.classList.remove('ringing'),700);
  if(Notification.permission==='granted') new Notification('BiGift — '+title,{body:sub,icon:'🎁'});
}
function renderNotifPanel(){
  const el=document.getElementById('notif-list');
  if(notifs.length===0){el.innerHTML='<div class="notif-empty">Bildirim yok</div>';return;}
  el.innerHTML=notifs.map(n=>`
    <div class="notif-item ${n.unread?'unread':''}">
      <div class="notif-item-title">${n.title}</div>
      <div class="notif-item-sub">${n.sub} · ${fmtTimeAgo(n.time)}</div>
    </div>`).join('');
}
window.toggleNotifPanel=()=>{
  const p=document.getElementById('notif-panel');
  p.classList.toggle('open');
  if(p.classList.contains('open')){
    notifs.forEach(n=>n.unread=false);
    document.getElementById('notif-dot').classList.remove('show');
  }
};
window.clearNotifs=()=>{notifs=[];renderNotifPanel();};
function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;g.gain.setValueAtTime(0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.4);
  }catch(e){}
}

window.toggleDrawer=()=>{
  const d=document.getElementById('drawer'),o=document.getElementById('drawer-overlay'),h=document.getElementById('hamburger');
  const open=d.classList.contains('open');
  d.classList.toggle('open',!open);o.classList.toggle('show',!open);h.classList.toggle('open',!open);
};
window.closeDrawer=()=>{
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('show');
  document.getElementById('hamburger').classList.remove('open');
};
window.goTo=s=>{
  current=s;closeDrawer();
  document.getElementById('notif-panel').classList.remove('open');
  ['overview','orders','categories','products','stats'].forEach(k=>
    document.getElementById('nav-'+k)?.classList.toggle('active',k===s));
  document.getElementById('topbar-section').textContent=LABELS[s];
  render();
};

function render(){
  const c=document.getElementById('main-content');
  c.style.animation='none';void c.offsetWidth;c.style.animation='fadeIn .3s ease';
  ({overview:renderOverview,orders:renderOrders,categories:renderCategories,products:renderProducts,stats:renderStats})[current]?.(c);
}

function renderOverview(c){
  const now=new Date();
  const todayOrds=orders.filter(o=>sameDay(o.createdAt,now));
  const weekOrds=orders.filter(o=>withinDays(o.createdAt,7));
  const todayRev=todayOrds.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+(o.total||0),0);
  const weekRev=weekOrds.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+(o.total||0),0);
  const monthRev=orders.filter(o=>withinDays(o.createdAt,30)&&o.status!=='cancelled').reduce((s,o)=>s+(o.total||0),0);
  const newCount=orders.filter(o=>o.status==='new').length;
  c.innerHTML=`
    <div class="page-header"><h1>Genel Bakış</h1><p>${fmtDate2(now)}</p></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${newCount}</div><div class="stat-label">Bekleyen Sipariş</div><div class="stat-sub">${newCount>0?'⚠️ İşlem bekliyor':'✓ Temiz'}</div></div>
      <div class="stat-card"><div class="stat-val">${todayOrds.length}</div><div class="stat-label">Bugünkü Sipariş</div><div class="stat-sub">₺${todayRev.toLocaleString('tr-TR')} gelir</div></div>
      <div class="stat-card"><div class="stat-val">₺${weekRev.toLocaleString('tr-TR')}</div><div class="stat-label">Bu Hafta</div><div class="stat-sub">${weekOrds.length} sipariş</div></div>
      <div class="stat-card"><div class="stat-val">₺${monthRev.toLocaleString('tr-TR')}</div><div class="stat-label">Bu Ay</div><div class="stat-sub">${orders.filter(o=>withinDays(o.createdAt,30)).length} sipariş</div></div>
    </div>
    <div class="panel">
      <div class="panel-head"><h2>Son Siparişler</h2><button class="btn btn-outline btn-sm" onclick="goTo('orders')">Tümü →</button></div>
      <div style="padding:0 16px">
        ${orders.slice(0,6).map(o=>`
          <div class="ov-row">
            <div class="ov-left"><span class="ov-icon">📦</span>
              <div><div class="ov-name">#${o.fsId.slice(-6).toUpperCase()}</div>
              <div class="ov-sub">${o.address?.name||'—'} · ${fmtDate(o.createdAt)}</div></div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="order-status status-${o.status||'new'}">${statusLbl(o.status)}</span>
              <span class="ov-val">₺${(o.total||0).toLocaleString('tr-TR')}</span>
            </div>
          </div>`).join('')}
        ${orders.length===0?'<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Henüz sipariş yok</div></div>':''}
      </div>
    </div>
    <div class="panel">
      <div class="panel-head"><h2>Stok Uyarısı</h2></div>
      <div style="padding:0 16px">
        ${cats.flatMap(c=>(c.products||[]).filter(p=>(p.stock??99)<=3).map(p=>({...p,catName:c.name,catIcon:c.icon||'📦'}))).slice(0,5).map(p=>`
          <div class="ov-row">
            <div class="ov-left"><span class="ov-icon">${p.image?`<img src="${p.image}" style="width:24px;height:24px;border-radius:4px;object-fit:cover">`:p.emoji||'🎁'}</span>
              <div><div class="ov-name">${p.name}</div><div class="ov-sub">${p.catIcon} ${p.catName}</div></div>
            </div>
            <span class="pc-stock ${p.stock<=0?'out':p.stock<=3?'low':'ok'}">${p.stock<=0?'Tükendi':p.stock+' adet'}</span>
          </div>`).join('')||'<div style="padding:12px;color:var(--muted);font-size:13px">✓ Tüm ürünler stokta</div>'}
      </div>
    </div>`;
}

function renderOrders(c){
  const filtered=orders.filter(o=>{
    const matchFilter=orderFilter==='all'||o.status===orderFilter;
    const q=orderSearch.toLowerCase();
    const matchSearch=!q||o.fsId.toLowerCase().includes(q)||(o.address?.name||'').toLowerCase().includes(q)||(o.address?.phone||'').includes(q)||(o.items||[]).some(i=>i.name.toLowerCase().includes(q));
    return matchFilter&&matchSearch;
  });
  c.innerHTML=`
    <div class="page-header"><h1>Siparişler</h1><p>${orders.length} toplam sipariş</p></div>
    <div class="search-bar">
      <input class="search-input" placeholder="🔍 Müşteri adı, telefon, sipariş no..." value="${orderSearch}" oninput="setOrderSearch(this.value)"/>
    </div>
    <div class="filter-pills">
      ${['all','new','preparing','shipped','delivered','cancelled'].map(s=>`
        <div class="filter-pill ${orderFilter===s?'active':''}" onclick="setOrderFilter('${s}')">
          ${s==='all'?'Tümü ('+orders.length+')':statusLbl(s)+' ('+orders.filter(o=>o.status===s).length+')'}
        </div>`).join('')}
    </div>
    <div id="orders-list">
      ${filtered.length===0
        ?'<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Sipariş bulunamadı</div></div>'
        :filtered.map(o=>`
        <div class="order-card">
          <div class="order-head">
            <div><div class="order-id">#${o.fsId.slice(-6).toUpperCase()}</div><div class="order-date">${fmtDate(o.createdAt)}</div></div>
            <span class="order-status status-${o.status||'new'}">${statusLbl(o.status)}</span>
          </div>
          <div class="order-items">
            ${(o.items||[]).map(it=>`<span class="order-item-chip">${it.image?`<img src="${it.image}" style="width:16px;height:16px;border-radius:3px;object-fit:cover">`:it.emoji||'📦'} ${it.name}</span>`).join('')}
          </div>
          ${o.note?`<div class="order-note">🎁 Not: "${o.note}"</div>`:''}
          ${o.orderNote?`<div class="order-note">📝 Sipariş notu: "${o.orderNote}"</div>`:''}
          ${o.address?`<div class="order-addr">👤 <strong>${o.address.name}</strong> · 📞 ${o.address.phone}<br>📍 ${o.address.city} / ${o.address.district}<br>${o.address.detail}</div>`:''}
          ${o.trackingNo?`<div style="font-size:11px;color:var(--muted);margin-bottom:6px">🚚 Takip: <strong>${o.trackingNo}</strong></div>`:''}
          <div class="order-foot">
            <div class="order-total">₺${(o.total||0).toLocaleString('tr-TR')}</div>
            <div class="order-actions">
              ${o.address?.phone?`<button class="btn btn-whatsapp btn-sm" onclick="openWhatsApp('${o.address.phone}','${o.fsId}')">💬 WhatsApp</button>`:''}
              <select class="status-select" onchange="updateStatus('${o.fsId}',this.value)">
                <option value="new" ${(o.status||'new')==='new'?'selected':''}>Yeni</option>
                <option value="preparing" ${o.status==='preparing'?'selected':''}>Hazırlanıyor</option>
                <option value="shipped" ${o.status==='shipped'?'selected':''}>Kargoda</option>
                <option value="delivered" ${o.status==='delivered'?'selected':''}>Teslim Edildi</option>
                <option value="cancelled" ${o.status==='cancelled'?'selected':''}>İptal</option>
              </select>
            </div>
          </div>
          <div class="tracking-row">
            <input class="tracking-input" id="track-${o.fsId}" placeholder="Kargo takip no" value="${o.trackingNo||''}"/>
            <button class="btn btn-outline btn-sm" onclick="saveTracking('${o.fsId}')">Kaydet</button>
          </div>
        </div>`).join('')}
    </div>`;
}

window.setOrderSearch=q=>{orderSearch=q;render();};
window.setOrderFilter=f=>{orderFilter=f;render();};
window.updateStatus=async(id,status)=>{
  try{await updateDoc(doc(db,'orders',id),{status});toast('Durum güncellendi ✓','success');}
  catch(e){toast('Hata: '+e.message,'error');}
};
window.saveTracking=async id=>{
  const no=document.getElementById('track-'+id)?.value.trim()||'';
  try{await updateDoc(doc(db,'orders',id),{trackingNo:no,status:'shipped'});toast('Takip no kaydedildi ✓','success');}
  catch(e){toast('Hata: '+e.message,'error');}
};
window.openWhatsApp=(phone,orderId)=>{
  const clean=phone.replace(/\D/g,'');
  const intl=clean.startsWith('0')?'90'+clean.slice(1):clean;
  const msg=encodeURIComponent(`Merhaba! BiGift siparişiniz #${orderId.slice(-6).toUpperCase()} hakkında bilgi vermek istedik.`);
  window.open(`https://wa.me/${intl}?text=${msg}`,'_blank');
};
  function renderCategories(c){
  c.innerHTML=`
    <div class="page-header"><h1>Kategoriler</h1><p>${cats.length} kategori</p></div>
    <div class="action-bar">
      <span style="font-size:13px;color:var(--muted)">${cats.length} kategori</span>
      <button class="btn btn-gold" onclick="openAddCat()">+ Yeni Kategori</button>
    </div>
    ${cats.map(cat=>`
      <div class="cat-row">
        <div class="cat-row-main">
          <div class="cr-left">
            <span class="cr-icon">${cat.icon||'📦'}</span>
            <div><div class="cr-name">${cat.name}</div>
            <div class="cr-meta">${cat.products?.length||0} ürün · ${cat.subcategories?.length||0} alt kategori</div></div>
          </div>
          <div class="cr-actions">
            <button class="btn btn-outline btn-sm btn-icon" onclick="openEditCat('${cat.fsId}')">✏️</button>
            <button class="btn btn-danger btn-sm btn-icon" onclick="deleteCat('${cat.fsId}','${cat.name}')">🗑</button>
          </div>
        </div>
        <div class="subcat-section">
          <div class="subcat-title">Alt Kategoriler</div>
          ${(cat.subcategories||[]).map(sub=>`
            <div class="subcat-item">
              <div class="subcat-item-left">${sub.icon||'📁'} ${sub.name}</div>
              <div class="subcat-item-actions">
                <button class="btn btn-outline btn-sm btn-icon" onclick="openEditSubcat('${cat.fsId}','${sub.id}')">✏️</button>
                <button class="btn btn-danger btn-sm btn-icon" onclick="deleteSubcat('${cat.fsId}','${sub.id}','${sub.name}')">🗑</button>
              </div>
            </div>`).join('')}
          ${(cat.subcategories||[]).length===0?'<div style="font-size:11px;color:var(--muted);padding:4px 0">Henüz alt kategori yok</div>':''}
          <button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="openAddSubcat('${cat.fsId}')">+ Alt Kategori Ekle</button>
        </div>
      </div>`).join('')}`;
}

window.openAddCat=()=>showModal(`
  <div class="modal-handle"></div><h2>Yeni Kategori</h2>
  <div class="form-row">
    <div class="form-group"><label>Kategori Adı</label><input id="m-cname" placeholder="Saatler"/></div>
    <div class="form-group"><label>Emoji</label>
      <div class="emoji-row">
        <input id="m-cicon" placeholder="⌚" maxlength="4" style="width:70px" oninput="document.getElementById('m-ciprev').textContent=this.value||'📦'"/>
        <span class="emoji-prev" id="m-ciprev">📦</span>
      </div>
    </div>
  </div>
  <div class="form-row single"><div class="form-group"><label>ID (slug)</label><input id="m-cid" placeholder="saat"/></div></div>
  <div class="modal-footer">
    <button class="btn btn-outline" onclick="closeModal()">İptal</button>
    <button class="btn btn-gold" onclick="addCat()">Kaydet</button>
  </div>`);

window.addCat=async()=>{
  const name=v('m-cname'),icon=v('m-cicon')||'📦',id=v('m-cid').toLowerCase().replace(/\s+/g,'-');
  if(!name||!id){toast('Ad ve ID zorunlu!','error');return;}
  if(cats.some(c=>c.id===id)){toast('Bu ID kullanılıyor!','error');return;}
  try{
    await setDoc(doc(db,'categories',id),{id,name,icon,products:[],subcategories:[],order:cats.length,createdAt:serverTimestamp()});
    await loadCats();closeModal();render();toast('Kategori eklendi ✓','success');
  }catch(e){toast('Hata: '+e.message,'error');}
};

window.openEditCat=fsId=>{
  const cat=cats.find(c=>c.fsId===fsId);if(!cat)return;
  showModal(`
    <div class="modal-handle"></div><h2>Kategori Düzenle</h2>
    <div class="form-row">
      <div class="form-group"><label>Ad</label><input id="m-cname" value="${cat.name}"/></div>
      <div class="form-group"><label>Emoji</label>
        <div class="emoji-row">
          <input id="m-cicon" value="${cat.icon||''}" maxlength="4" style="width:70px" oninput="document.getElementById('m-ciprev').textContent=this.value||'?'"/>
          <span class="emoji-prev" id="m-ciprev">${cat.icon||'📦'}</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">İptal</button>
      <button class="btn btn-gold" onclick="editCat('${fsId}')">Kaydet</button>
    </div>`);
};
window.editCat=async fsId=>{
  const cat=cats.find(c=>c.fsId===fsId);if(!cat)return;
  try{
    await updateDoc(doc(db,'categories',fsId),{name:v('m-cname')||cat.name,icon:v('m-cicon')||cat.icon});
    await loadCats();closeModal();render();toast('Kaydedildi ✓','success');
  }catch(e){toast('Hata: '+e.message,'error');}
};
window.deleteCat=async(fsId,name)=>{
  if(!confirm(`"${name}" silinecek. Emin misiniz?`))return;
  try{await deleteDoc(doc(db,'categories',fsId));await loadCats();render();toast('Silindi ✓','success');}
  catch(e){toast('Hata: '+e.message,'error');}
};

window.openAddSubcat=fsId=>showModal(`
  <div class="modal-handle"></div><h2>Alt Kategori Ekle</h2>
  <div class="form-row">
    <div class="form-group"><label>Alt Kategori Adı</label><input id="m-sname" placeholder="Bayan Saat"/></div>
    <div class="form-group"><label>Emoji</label>
      <div class="emoji-row">
        <input id="m-sicon" placeholder="👩" maxlength="4" style="width:70px" oninput="document.getElementById('m-siprev').textContent=this.value||'📁'"/>
        <span class="emoji-prev" id="m-siprev">📁</span>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-outline" onclick="closeModal()">İptal</button>
    <button class="btn btn-gold" onclick="addSubcat('${fsId}')">Kaydet</button>
  </div>`);

window.addSubcat=async fsId=>{
  const cat=cats.find(c=>c.fsId===fsId);if(!cat)return;
  const name=v('m-sname'),icon=v('m-sicon')||'📁';
  if(!name){toast('Ad zorunlu!','error');return;}
  const id=Date.now().toString();
  const subs=[...(cat.subcategories||[]),{id,name,icon}];
  try{
    await updateDoc(doc(db,'categories',fsId),{subcategories:subs});
    await loadCats();closeModal();render();toast('Alt kategori eklendi ✓','success');
  }catch(e){toast('Hata: '+e.message,'error');}
};

window.openEditSubcat=(fsId,subId)=>{
  const cat=cats.find(c=>c.fsId===fsId);
  const sub=(cat?.subcategories||[]).find(s=>s.id===subId);if(!sub)return;
  showModal(`
    <div class="modal-handle"></div><h2>Alt Kategori Düzenle</h2>
    <div class="form-row">
      <div class="form-group"><label>Ad</label><input id="m-sname" value="${sub.name}"/></div>
      <div class="form-group"><label>Emoji</label>
        <div class="emoji-row">
          <input id="m-sicon" value="${sub.icon||''}" maxlength="4" style="width:70px" oninput="document.getElementById('m-siprev').textContent=this.value||'?'"/>
          <span class="emoji-prev" id="m-siprev">${sub.icon||'📁'}</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">İptal</button>
      <button class="btn btn-gold" onclick="editSubcat('${fsId}','${subId}')">Kaydet</button>
    </div>`);
};
window.editSubcat=async(fsId,subId)=>{
  const cat=cats.find(c=>c.fsId===fsId);if(!cat)return;
  const subs=(cat.subcategories||[]).map(s=>s.id===subId?{...s,name:v('m-sname')||s.name,icon:v('m-sicon')||s.icon}:s);
  try{
    await updateDoc(doc(db,'categories',fsId),{subcategories:subs});
    await loadCats();closeModal();render();toast('Kaydedildi ✓','success');
  }catch(e){toast('Hata: '+e.message,'error');}
};
window.deleteSubcat=async(fsId,subId,name)=>{
  if(!confirm(`"${name}" silinecek. Emin misiniz?`))return;
  const cat=cats.find(c=>c.fsId===fsId);if(!cat)return;
  const subs=(cat.subcategories||[]).filter(s=>s.id!==subId);
  try{
    await updateDoc(doc(db,'categories',fsId),{subcategories:subs});
    await loadCats();render();toast('Silindi ✓','success');
  }catch(e){toast('Hata: '+e.message,'error');}
};

function renderProducts(c){
  const all=[];cats.forEach(cat=>(cat.products||[]).forEach(p=>all.push({...p,catFsId:cat.fsId,catName:cat.name,catIcon:cat.icon||'📦'})));
  c.innerHTML=`
    <div class="page-header"><h1>Ürünler</h1><p>${all.length} ürün</p></div>
    <div class="action-bar">
      <span style="font-size:13px;color:var(--muted)">${all.length} ürün</span>
      <button class="btn btn-gold" onclick="openAddProd()">+ Yeni Ürün</button>
    </div>
    ${all.length===0
      ?'<div class="empty-state"><div class="empty-icon">🎁</div><div class="empty-text">Henüz ürün yok</div></div>'
      :all.map(p=>`
        <div class="prod-card">
          <div class="pc-img">${p.image?`<img src="${p.image}">`:p.emoji||'🎁'}</div>
          <div class="pc-info">
            <div class="pc-name">${p.name}</div>
            <div class="pc-meta">
              <span class="pc-cat">${p.catIcon} ${p.catName}</span>
              <span class="pc-price">₺${(p.price||0).toLocaleString('tr-TR')}</span>
              <span class="pc-stock ${(p.stock??99)>5?'ok':(p.stock??99)>0?'low':'out'}">${(p.stock??0)<=0?'Tükendi':(p.stock??'∞')+' adet'}</span>
            </div>
            <div class="pc-desc">${p.desc||''}</div>
          </div>
          <div class="pc-actions">
            <button class="btn btn-outline btn-sm btn-icon" onclick="openEditProd('${p.id}','${p.catFsId}')">✏️</button>
            <button class="btn btn-danger btn-sm btn-icon" onclick="deleteProd('${p.id}','${p.catFsId}')">🗑</button>
          </div>
        </div>`).join('')}`;
}

function prodModal(p={},catFsId=''){
  const isEdit=!!p.id;
  const cat=cats.find(c=>c.fsId===(catFsId||cats[0]?.fsId));
  return `
    <div class="modal-handle"></div>
    <h2>${isEdit?'Ürün Düzenle':'Yeni Ürün'}</h2>
    ${!isEdit?`<div class="form-row single"><div class="form-group"><label>Kategori</label>
      <select id="m-pcat" onchange="updateSubcatSelect(this.value)">${cats.map(c=>`<option value="${c.fsId}" ${c.fsId===catFsId?'selected':''}>${c.icon||''} ${c.name}</option>`).join('')}</select>
    </div></div>
    <div class="form-row single"><div class="form-group"><label>Alt Kategori (opsiyonel)</label>
      <select id="m-psub"><option value="">-- Seçiniz --</option>${(cat?.subcategories||[]).map(s=>`<option value="${s.id}">${s.icon||''} ${s.name}</option>`).join('')}</select>
    </div></div>`:''}
    <div class="form-row">
      <div class="form-group"><label>Ürün Adı</label><input id="m-pname" value="${p.name||''}" placeholder="Altın Kolye"/></div>
      <div class="form-group"><label>Fiyat (₺)</label><input id="m-pprice" type="number" value="${p.price||''}" placeholder="2500"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Stok Adedi</label><input id="m-pstock" type="number" value="${p.stock??0}" placeholder="10"/></div>
      <div class="form-group"><label>Emoji (yedek)</label>
        <div class="emoji-row">
          <input id="m-pemoji" value="${p.emoji||''}" maxlength="4" style="width:70px" oninput="document.getElementById('m-peprev').textContent=this.value||'🎁'"/>
          <span class="emoji-prev" id="m-peprev">${p.emoji||'🎁'}</span>
        </div>
      </div>
    </div>
    <div class="form-row single">
      <div class="form-group">
        <label>Görsel URL (imgbb)</label>
        <input id="m-pimage" value="${p.image||''}" placeholder="https://i.ibb.co/xxxx/gorsel.jpg" oninput="previewImg(this.value)"/>
        <div class="img-url-note">imgbb.com → resim yükle → "Direct Link" kopyala</div>
        <img id="m-pimgprev" class="img-preview ${p.image?'show':''}" src="${p.image||''}" alt="">
      </div>
    </div>
    <div class="form-row single">
      <div class="form-group"><label>Açıklama</label><input id="m-pdesc" value="${p.desc||''}" placeholder="14 ayar, özel tasarım"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">İptal</button>
      <button class="btn btn-gold" onclick="${isEdit?`editProd('${p.id}','${catFsId}')`:'addProd()'}">Kaydet</button>
    </div>`;
}

window.updateSubcatSelect=fsId=>{
  const cat=cats.find(c=>c.fsId===fsId);
  const sel=document.getElementById('m-psub');if(!sel)return;
  sel.innerHTML='<option value="">-- Seçiniz --</option>'+(cat?.subcategories||[]).map(s=>`<option value="${s.id}">${s.icon||''} ${s.name}</option>`).join('');
};
window.previewImg=url=>{const el=document.getElementById('m-pimgprev');if(!el)return;el.src=url;el.classList.toggle('show',!!url);};
window.openAddProd=()=>showModal(prodModal());
window.addProd=async()=>{
  const catFsId=v('m-pcat'),name=v('m-pname'),price=parseInt(v('m-pprice'))||0;
  if(!name||price<=0){toast('Ad ve fiyat zorunlu!','error');return;}
  const cat=cats.find(c=>c.fsId===catFsId);if(!cat)return;
  const subcategoryId=v('m-psub')||'';
  const prod={id:Date.now().toString(),name,price,stock:parseInt(v('m-pstock'))||0,emoji:v('m-pemoji')||'🎁',image:v('m-pimage')||'',desc:v('m-pdesc'),subcategoryId};
  try{
    await updateDoc(doc(db,'categories',catFsId),{products:[...(cat.products||[]),prod]});
    await loadCats();closeModal();render();toast('Ürün eklendi ✓','success');
  }catch(e){toast('Hata: '+e.message,'error');}
};
window.openEditProd=(prodId,catFsId)=>{
  const cat=cats.find(c=>c.fsId===catFsId);
  const p=cat?.products?.find(pr=>pr.id===prodId);
  if(!p)return;showModal(prodModal(p,catFsId));
};
window.editProd=async(prodId,catFsId)=>{
  const cat=cats.find(c=>c.fsId===catFsId);if(!cat)return;
  const products=(cat.products||[]).map(p=>p.id===prodId?{
    ...p,name:v('m-pname')||p.name,price:parseInt(v('m-pprice'))||p.price,
    stock:parseInt(v('m-pstock'))??p.stock,emoji:v('m-pemoji')||p.emoji,
    image:v('m-pimage')??p.image,desc:v('m-pdesc')
  }:p);
  try{await updateDoc(doc(db,'categories',catFsId),{products});await loadCats();closeModal();render();toast('Kaydedildi ✓','success');}
  catch(e){toast('Hata: '+e.message,'error');}
};
window.deleteProd=async(prodId,catFsId)=>{
  if(!confirm('Ürünü silmek istediğinize emin misiniz?'))return;
  const cat=cats.find(c=>c.fsId===catFsId);if(!cat)return;
  try{
    await updateDoc(doc(db,'categories',catFsId),{products:(cat.products||[]).filter(p=>p.id!==prodId)});
    await loadCats();render();toast('Silindi ✓','success');
  }catch(e){toast('Hata: '+e.message,'error');}
};

let chartInstance=null,statPeriod='week';
function renderStats(c){
  c.innerHTML=`
    <div class="page-header"><h1>İstatistikler</h1><p>Satış analizi</p></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${orders.length}</div><div class="stat-label">Toplam Sipariş</div></div>
      <div class="stat-card"><div class="stat-val">₺${orders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+(o.total||0),0).toLocaleString('tr-TR')}</div><div class="stat-label">Toplam Gelir</div></div>
      <div class="stat-card"><div class="stat-val">${orders.length>0?Math.round(orders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+(o.total||0),0)/Math.max(orders.filter(o=>o.status!=='cancelled').length,1)).toLocaleString('tr-TR'):0}</div><div class="stat-label">Ort. Sepet (₺)</div></div>
      <div class="stat-card"><div class="stat-val">${orders.filter(o=>o.status==='delivered').length}</div><div class="stat-label">Teslim Edildi</div></div>
    </div>
    <div class="chart-card">
      <h3>Satış Grafiği</h3>
      <div class="chart-sub">Günlük sipariş ve gelir</div>
      <div class="chart-tabs">
        <div class="chart-tab ${statPeriod==='week'?'active':''}" onclick="setStatPeriod('week')">7 Gün</div>
        <div class="chart-tab ${statPeriod==='month'?'active':''}" onclick="setStatPeriod('month')">30 Gün</div>
      </div>
      <div class="chart-wrap"><canvas id="sales-chart"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-head"><h2>🏆 En Çok Satanlar</h2></div>
      <div id="top-products" style="padding:0 16px"></div>
    </div>
    <div class="panel">
      <div class="panel-head"><h2>📊 Sipariş Durumu</h2></div>
      <div style="padding:16px"><canvas id="status-chart" height="200"></canvas></div>
    </div>`;
  buildSalesChart();buildTopProducts();buildStatusChart();
}
window.setStatPeriod=p=>{statPeriod=p;render();};

function buildSalesChart(){
  const days=statPeriod==='week'?7:30;
  const labels=[],dataOrds=[],dataRev=[];
  for(let i=days-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    labels.push(d.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit'}));
    const dayOrds=orders.filter(o=>sameDay(o.createdAt,d));
    dataOrds.push(dayOrds.length);
    dataRev.push(dayOrds.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+(o.total||0),0));
  }
  if(chartInstance)chartInstance.destroy();
  const ctx=document.getElementById('sales-chart')?.getContext('2d');if(!ctx)return;
  chartInstance=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[
      {label:'Sipariş',data:dataOrds,backgroundColor:'rgba(232,53,90,.4)',borderColor:'#E8355A',borderWidth:1,borderRadius:4,yAxisID:'y'},
      {label:'Gelir (₺)',data:dataRev,type:'line',borderColor:'rgba(245,166,35,.8)',backgroundColor:'rgba(245,166,35,.1)',borderWidth:2,tension:.4,pointRadius:3,yAxisID:'y1'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#8A7A8A',font:{size:11}}}},
      scales:{
        x:{ticks:{color:'#8A7A8A',font:{size:10}},grid:{color:'rgba(26,26,46,.05)'}},
        y:{ticks:{color:'#8A7A8A',font:{size:10}},grid:{color:'rgba(26,26,46,.05)'},position:'left'},
        y1:{ticks:{color:'#8A7A8A',font:{size:10}},grid:{display:false},position:'right'},
      }}
  });
}

function buildTopProducts(){
  const counts={};
  orders.filter(o=>o.status!=='cancelled').forEach(o=>(o.items||[]).forEach(it=>{
    if(!counts[it.name])counts[it.name]={count:0,rev:0,emoji:it.emoji||'🎁',image:it.image||''};
    counts[it.name].count++;counts[it.name].rev+=(it.price||0);
  }));
  const sorted=Object.entries(counts).sort((a,b)=>b[1].count-a[1].count).slice(0,5);
  const el=document.getElementById('top-products');if(!el)return;
  el.innerHTML=sorted.length===0?'<div style="padding:16px;color:var(--muted);font-size:13px">Henüz satış yok</div>'
    :sorted.map(([name,d],i)=>`
      <div class="top-prod-row">
        <div class="tp-rank">${i+1}</div>
        <div class="tp-emoji">${d.image?`<img src="${d.image}" style="width:28px;height:28px;border-radius:6px;object-fit:cover">`:d.emoji}</div>
        <div class="tp-info"><div class="tp-name">${name}</div><div class="tp-count">${d.count} satış</div></div>
        <div class="tp-rev">₺${d.rev.toLocaleString('tr-TR')}</div>
      </div>`).join('');
}

function buildStatusChart(){
  const statusData={new:0,preparing:0,shipped:0,delivered:0,cancelled:0};
  orders.forEach(o=>statusData[o.status||'new']++);
  const ctx=document.getElementById('status-chart')?.getContext('2d');if(!ctx)return;
  new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:['Yeni','Hazırlanıyor','Kargoda','Teslim','İptal'],
      datasets:[{data:Object.values(statusData),backgroundColor:['rgba(232,53,90,.7)','rgba(50,100,200,.7)','rgba(6,214,160,.7)','rgba(120,120,120,.7)','rgba(180,50,50,.7)'],borderWidth:0}]
    },
    options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#8A7A8A',font:{size:10},padding:10}}}}
  });
}

window.showModal=html=>{
  closeModal();
  const ov=document.createElement('div');ov.className='modal-overlay';ov.id='active-modal';
  ov.onclick=e=>{if(e.target===ov)closeModal();};
  const box=document.createElement('div');box.className='modal';box.innerHTML=html;
  ov.appendChild(box);document.getElementById('modal-container').appendChild(ov);
};
window.closeModal=()=>document.getElementById('active-modal')?.remove();
window.v=id=>(document.getElementById(id)?.value||'').trim();

function fmtDate(ts){
  if(!ts)return'-';const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function fmtDate2(d){return d.toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function fmtTimeAgo(d){
  const diff=Math.floor((Date.now()-d)/1000);
  if(diff<60)return 'Az önce';if(diff<3600)return Math.floor(diff/60)+' dk önce';
  if(diff<86400)return Math.floor(diff/3600)+' sa önce';return Math.floor(diff/86400)+' gün önce';
}
function sameDay(ts,d){
  if(!ts)return false;const a=ts.toDate?ts.toDate():new Date(ts);
  return a.toDateString()===d.toDateString();
}
function withinDays(ts,n){
  if(!ts)return false;const a=ts.toDate?ts.toDate():new Date(ts);
  return(Date.now()-a.getTime())<n*86400000;
}
function statusLbl(s){return{new:'Yeni',preparing:'Hazırlanıyor',shipped:'Kargoda',delivered:'Teslim Edildi',cancelled:'İptal'}[s]||'Yeni';}

let tTimer=null;
window.toast=(msg,type='success')=>{
  const el=document.getElementById('toast');el.textContent=msg;el.className='show '+type;
  if(tTimer)clearTimeout(tTimer);tTimer=setTimeout(()=>{el.className='';},2500);
};
</script>
